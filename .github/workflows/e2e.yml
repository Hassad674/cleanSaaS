# =============================================================================
# NOTE: This HEAVY end-to-end workflow is OPT-IN and intentionally NOT part of
# the default required status checks. It is slow and more flaky-prone than the
# fast CI pipeline. On pull requests it runs ONLY when the PR carries the
# `run-e2e` label (plus unconditionally on push to main). Do NOT add this
# workflow to branch-protection required checks.
# =============================================================================
name: E2E

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: end-to-end (playwright)
    runs-on: ubuntu-latest
    # Gate: run on push to main, OR on a PR only if it has the `run-e2e` label.
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e')

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cleansaas
        # Inside the runner network the service is reachable on the standard
        # 5432 port (the docker-compose 5433 host mapping does not apply here).
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cleansaas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cleansaas?sslmode=disable
      JWT_SECRET: test-jwt-secret-not-for-production
      PORT: "8081"
      FRONTEND_URL: http://localhost:3010
      NEXT_PUBLIC_API_URL: http://localhost:8081

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run migrations
        run: cd backend && go run cmd/migrate/main.go up

      - name: Seed database
        run: cd backend && go run cmd/seed/main.go

      - name: Start backend
        run: |
          cd backend
          go run cmd/api/main.go &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for backend /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:${PORT}/health" >/dev/null 2>&1; then
              echo "Backend is up."
              exit 0
            fi
            echo "Waiting for backend... ($i)"
            sleep 2
          done
          echo "::error::Backend did not become healthy in time"
          exit 1

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Start frontend
        run: |
          cd frontend
          npm run start -- -p 3010 &
          echo "FRONTEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:3010" >/dev/null 2>&1; then
              echo "Frontend is up."
              exit 0
            fi
            echo "Waiting for frontend... ($i)"
            sleep 2
          done
          echo "::error::Frontend did not become reachable in time"
          exit 1

      - name: Run Playwright tests
        run: cd frontend && npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 14
